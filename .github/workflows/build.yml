name: Build and test SeBa

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: make
      run: make
    - name: make dstar
      run: |
        cd dstar
        make
    - name: Build and run unit tests
      run: |
        git submodule update --init --recursive
        make test